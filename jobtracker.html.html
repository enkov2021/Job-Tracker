<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menara Kontrol Lamaran · Febriansyah</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#10152A;
  --panel:#182136;
  --panel-2:#1F2A45;
  --line:#2B3654;
  --text:#ECE8DD;
  --text-dim:#8891A8;
  --amber:#FFB627;
  --sage:#6FA98A;
  --coral:#E1574F;
  --sky:#5B9BD5;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  line-height:1.5;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:32px 20px 80px;
}

/* ---------- HEADER ---------- */
header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:24px;
  padding-bottom:28px;
  border-bottom:1px solid var(--line);
  margin-bottom:32px;
}

.brand-eyebrow{
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.18em;
  color:var(--amber);
  text-transform:uppercase;
  margin-bottom:8px;
}

h1{
  font-family:'Space Mono',monospace;
  font-size:clamp(24px,4vw,34px);
  letter-spacing:0.02em;
  text-transform:uppercase;
  color:var(--text);
}

.subtitle{
  color:var(--text-dim);
  font-size:14px;
  margin-top:8px;
  max-width:420px;
}

.stats{
  display:flex;
  gap:28px;
}

.stat{
  text-align:right;
}

.stat-num{
  font-family:'Space Mono',monospace;
  font-size:28px;
  font-weight:700;
  color:var(--amber);
  line-height:1;
}

.stat-label{
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-top:4px;
}

/* ---------- SECTION HEADERS ---------- */
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  flex-wrap:wrap;
  gap:12px;
}

.section-title{
  font-family:'Space Mono',monospace;
  font-size:13px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-dim);
}

.section-title span{color:var(--text);}

/* ---------- DEPARTURE BOARD ---------- */
.board{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:6px;
  overflow:hidden;
  margin-bottom:48px;
}

.board-head-row{
  display:grid;
  grid-template-columns:90px 1.4fr 1.4fr 100px 1fr 90px 40px;
  gap:12px;
  padding:12px 20px;
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text-dim);
  border-bottom:1px solid var(--line);
}

.flap-row{
  display:grid;
  grid-template-columns:90px 1.4fr 1.4fr 100px 1fr 90px 40px;
  gap:12px;
  align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--line);
  transform-origin:top;
  animation:flapIn 0.35s ease-out;
}

.flap-row:last-child{border-bottom:none;}

@keyframes flapIn{
  0%{transform:rotateX(-90deg); opacity:0;}
  100%{transform:rotateX(0deg); opacity:1;}
}

.flap-date{
  font-family:'Space Mono',monospace;
  font-size:13px;
  color:var(--text);
}

.flap-company{font-weight:600; font-size:14px;}
.flap-position{font-size:13px; color:var(--text-dim);}

.badge{
  display:inline-block;
  font-family:'Space Mono',monospace;
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:4px 8px;
  border-radius:3px;
  white-space:nowrap;
}
.badge.Dilamar{background:rgba(91,155,213,0.15); color:var(--sky);}
.badge.Interview{background:rgba(255,182,39,0.15); color:var(--amber);}
.badge.Tawaran{background:rgba(111,169,138,0.15); color:var(--sage);}
.badge.Ditolak{background:rgba(225,87,79,0.15); color:var(--coral);}

.flap-next{font-size:13px; color:var(--text-dim);}

.countdown{
  font-family:'Space Mono',monospace;
  font-size:12px;
  font-weight:700;
  padding:3px 8px;
  border-radius:3px;
  text-align:center;
}
.countdown.soon{background:rgba(225,87,79,0.18); color:var(--coral);}
.countdown.upcoming{background:rgba(255,182,39,0.15); color:var(--amber);}
.countdown.later{background:rgba(255,255,255,0.06); color:var(--text-dim);}

.row-actions{
  display:flex;
  gap:8px;
  justify-content:flex-end;
}

.icon-btn{
  background:none;
  border:none;
  color:var(--text-dim);
  cursor:pointer;
  font-size:14px;
  padding:2px;
  transition:color 0.15s;
}
.icon-btn:hover{color:var(--amber);}

.empty-board{
  padding:40px 20px;
  text-align:center;
  color:var(--text-dim);
  font-size:14px;
}

/* ---------- KANBAN ---------- */
.kanban{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.kcol{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:6px;
  padding:14px;
  min-height:120px;
}

.kcol-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.kcol-count{
  background:var(--panel-2);
  border-radius:10px;
  padding:1px 8px;
  color:var(--text-dim);
  font-size:11px;
}

.kcard{
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:5px;
  padding:10px 12px;
  margin-bottom:10px;
  cursor:pointer;
  transition:border-color 0.15s;
}
.kcard:hover{border-color:var(--amber);}

.kcard-company{font-weight:600; font-size:13px;}
.kcard-position{font-size:12px; color:var(--text-dim); margin-top:2px;}
.kcard-date{
  font-family:'Space Mono',monospace;
  font-size:10px;
  color:var(--text-dim);
  margin-top:8px;
}

.kcol-empty{
  color:var(--text-dim);
  font-size:12px;
  text-align:center;
  padding:20px 4px;
}

/* ---------- FAB ---------- */
.fab{
  position:fixed;
  bottom:28px;
  right:28px;
  background:var(--amber);
  color:var(--bg);
  border:none;
  border-radius:50px;
  padding:14px 24px;
  font-family:'Space Mono',monospace;
  font-weight:700;
  font-size:13px;
  letter-spacing:0.05em;
  text-transform:uppercase;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(255,182,39,0.3);
  transition:transform 0.15s;
}
.fab:hover{transform:translateY(-2px);}

/* ---------- MODAL ---------- */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(6,9,20,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:50;
}
.overlay.active{display:flex;}

.modal{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  width:100%;
  max-width:480px;
  max-height:90vh;
  overflow-y:auto;
  padding:28px;
}

.modal-title{
  font-family:'Space Mono',monospace;
  font-size:16px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-bottom:20px;
}

.field{margin-bottom:14px;}
.field label{
  display:block;
  font-size:11px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--text-dim);
  margin-bottom:6px;
}
.field input, .field select, .field textarea{
  width:100%;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:4px;
  padding:9px 10px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:13px;
}
.field input:focus, .field select:focus, .field textarea:focus{
  outline:2px solid var(--amber);
  outline-offset:1px;
}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.field textarea{resize:vertical; min-height:60px;}

.modal-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:20px;
  gap:10px;
}

.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:13px;
  padding:10px 18px;
  border-radius:5px;
  border:none;
  cursor:pointer;
}
.btn-primary{background:var(--amber); color:var(--bg);}
.btn-ghost{background:none; color:var(--text-dim); border:1px solid var(--line);}
.btn-danger{background:none; color:var(--coral); border:1px solid rgba(225,87,79,0.4);}

/* ---------- RESPONSIVE ---------- */
@media (max-width:800px){
  .kanban{grid-template-columns:1fr 1fr;}
  .board-head-row{display:none;}
  .flap-row{
    grid-template-columns:1fr;
    gap:6px;
    padding:16px 16px;
  }
  .row-actions{justify-content:flex-start;}
}
@media (max-width:480px){
  .kanban{grid-template-columns:1fr;}
  .stats{gap:16px;}
}

@media (prefers-reduced-motion: reduce){
  .flap-row{animation:none;}
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <div class="brand-eyebrow">Menara Kontrol · Febriansyah</div>
      <h1>Papan Jadwal Lamaran</h1>
      <p class="subtitle">Halo, Febriansyah. Pantau setiap lamaran seperti penerbangan: status, tujuan, dan kapan kamu harus bergerak selanjutnya.</p>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="section-head">
    <div class="section-title">Jadwal Mendatang · <span id="board-count">0</span> agenda</div>
  </div>
  <div class="board" id="board"></div>

  <div class="section-head">
    <div class="section-title">Progres Lamaran</div>
  </div>
  <div class="kanban" id="kanban"></div>
</div>

<button class="fab" id="addBtn">+ Tambah Lamaran</button>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Tambah Lamaran</div>
    <form id="appForm">
      <div class="field">
        <label>Nama Perusahaan</label>
        <input type="text" id="f-company" required placeholder="cth. Bank Mandiri">
      </div>
      <div class="field">
        <label>Posisi yang Dilamar</label>
        <input type="text" id="f-position" required placeholder="cth. Data Analyst">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Tanggal Melamar</label>
          <input type="date" id="f-applied" required>
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="Dilamar">Dilamar</option>
            <option value="Interview">Interview</option>
            <option value="Tawaran">Tawaran</option>
            <option value="Ditolak">Ditolak</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Agenda Berikutnya</label>
          <input type="text" id="f-nextlabel" placeholder="cth. Interview HR">
        </div>
        <div class="field">
          <label>Tanggal Agenda</label>
          <input type="date" id="f-nextdate">
        </div>
      </div>
      <div class="field">
        <label>Catatan</label>
        <textarea id="f-notes" placeholder="Kontak HR, link lowongan, hasil interview, dll."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;">Hapus</button>
        <div style="display:flex; gap:10px; margin-left:auto;">
          <button type="button" class="btn btn-ghost" id="cancelBtn">Batal</button>
          <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
let applications = [
  {id:1, company:"Traveloka", position:"Product Analyst", appliedDate:"2026-06-20", status:"Interview", nextLabel:"Interview User HR", nextDate:"2026-07-08", notes:"Kontak: Sari (HR). Sudah tes online, nunggu jadwal interview."},
  {id:2, company:"Bank Mandiri", position:"IT Support Officer", appliedDate:"2026-06-25", status:"Dilamar", nextLabel:"Tunggu psikotes", nextDate:"2026-07-12", notes:"Lamar via portal resmi, belum ada balasan."},
  {id:3, company:"Gojek", position:"Data Analyst", appliedDate:"2026-06-10", status:"Tawaran", nextLabel:"Deadline nego gaji", nextDate:"2026-07-07", notes:"Sudah interview 3x, tinggal nego offer."},
  {id:4, company:"Startup Lokal", position:"Content Writer", appliedDate:"2026-05-30", status:"Ditolak", nextLabel:"", nextDate:"", notes:"Ditolak karena kurang pengalaman B2B."}
];

let nextId = 5;
let editingId = null;

const STATUS_LIST = ["Dilamar","Interview","Tawaran","Ditolak"];

function fmtDate(d){
  if(!d) return "-";
  const dt = new Date(d+"T00:00:00");
  return dt.toLocaleDateString('id-ID', {day:'2-digit', month:'short'});
}

function daysUntil(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(d+"T00:00:00");
  return Math.round((target - today) / 86400000);
}

function countdownLabel(d){
  const diff = daysUntil(d);
  if(diff < 0) return {text:"TERLEWAT", cls:"soon"};
  if(diff === 0) return {text:"HARI INI", cls:"soon"};
  if(diff <= 3) return {text:"H-"+diff, cls:"soon"};
  if(diff <= 10) return {text:"H-"+diff, cls:"upcoming"};
  return {text:"H-"+diff, cls:"later"};
}

function render(){
  renderStats();
  renderBoard();
  renderKanban();
}

function renderStats(){
  const total = applications.length;
  const activeInterview = applications.filter(a=>a.status==="Interview").length;
  const upcoming7 = applications.filter(a=>a.nextDate && daysUntil(a.nextDate)>=0 && daysUntil(a.nextDate)<=7).length;
  const offers = applications.filter(a=>a.status==="Tawaran").length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total Lamaran</div></div>
    <div class="stat"><div class="stat-num">${activeInterview}</div><div class="stat-label">Interview Aktif</div></div>
    <div class="stat"><div class="stat-num">${upcoming7}</div><div class="stat-label">7 Hari Kedepan</div></div>
    <div class="stat"><div class="stat-num">${offers}</div><div class="stat-label">Tawaran</div></div>
  `;
}

function renderBoard(){
  const upcoming = applications
    .filter(a => a.nextDate && a.status !== "Ditolak")
    .sort((a,b) => new Date(a.nextDate) - new Date(b.nextDate));

  document.getElementById('board-count').textContent = upcoming.length;
  const board = document.getElementById('board');

  if(upcoming.length === 0){
    board.innerHTML = `<div class="empty-board">Belum ada agenda terjadwal. Tambahkan lamaran dengan tanggal agenda berikutnya.</div>`;
    return;
  }

  const cd = countdownLabel;
  board.innerHTML = `
    <div class="board-head-row">
      <div>Tanggal</div><div>Perusahaan</div><div>Posisi</div><div>Status</div><div>Agenda</div><div>Countdown</div><div></div>
    </div>
    ${upcoming.map(a => {
      const c = cd(a.nextDate);
      return `
      <div class="flap-row">
        <div class="flap-date">${fmtDate(a.nextDate)}</div>
        <div class="flap-company">${escapeHtml(a.company)}</div>
        <div class="flap-position">${escapeHtml(a.position)}</div>
        <div><span class="badge ${a.status}">${a.status}</span></div>
        <div class="flap-next">${escapeHtml(a.nextLabel || "-")}</div>
        <div class="countdown ${c.cls}">${c.text}</div>
        <div class="row-actions">
          <button class="icon-btn" onclick="openModal(${a.id})" title="Edit">✎</button>
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderKanban(){
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = STATUS_LIST.map(status => {
    const items = applications.filter(a => a.status === status);
    return `
      <div class="kcol">
        <div class="kcol-head">
          <span>${status}</span>
          <span class="kcol-count">${items.length}</span>
        </div>
        ${items.length === 0
          ? `<div class="kcol-empty">Kosong</div>`
          : items.map(a => `
            <div class="kcard" onclick="openModal(${a.id})">
              <div class="kcard-company">${escapeHtml(a.company)}</div>
              <div class="kcard-position">${escapeHtml(a.position)}</div>
              <div class="kcard-date">DILAMAR ${fmtDate(a.appliedDate)}</div>
            </div>
          `).join('')
        }
      </div>
    `;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || "";
  return div.innerHTML;
}

// ---------- MODAL ----------
const overlay = document.getElementById('overlay');
const form = document.getElementById('appForm');

function openModal(id){
  editingId = id || null;
  const deleteBtn = document.getElementById('deleteBtn');
  if(editingId){
    const app = applications.find(a => a.id === editingId);
    document.getElementById('modalTitle').textContent = "Edit Lamaran";
    document.getElementById('f-company').value = app.company;
    document.getElementById('f-position').value = app.position;
    document.getElementById('f-applied').value = app.appliedDate;
    document.getElementById('f-status').value = app.status;
    document.getElementById('f-nextlabel').value = app.nextLabel || "";
    document.getElementById('f-nextdate').value = app.nextDate || "";
    document.getElementById('f-notes').value = app.notes || "";
    deleteBtn.style.display = "inline-block";
  } else {
    document.getElementById('modalTitle').textContent = "Tambah Lamaran";
    form.reset();
    document.getElementById('f-applied').value = new Date().toISOString().slice(0,10);
    deleteBtn.style.display = "none";
  }
  overlay.classList.add('active');
}

function closeModal(){
  overlay.classList.remove('active');
  editingId = null;
  form.reset();
}

document.getElementById('addBtn').addEventListener('click', () => openModal(null));
document.getElementById('cancelBtn').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => { if(e.target === overlay) closeModal(); });

document.getElementById('deleteBtn').addEventListener('click', () => {
  if(editingId){
    applications = applications.filter(a => a.id !== editingId);
    closeModal();
    render();
  }
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const data = {
    company: document.getElementById('f-company').value.trim(),
    position: document.getElementById('f-position').value.trim(),
    appliedDate: document.getElementById('f-applied').value,
    status: document.getElementById('f-status').value,
    nextLabel: document.getElementById('f-nextlabel').value.trim(),
    nextDate: document.getElementById('f-nextdate').value,
    notes: document.getElementById('f-notes').value.trim()
  };

  if(editingId){
    const idx = applications.findIndex(a => a.id === editingId);
    applications[idx] = {...applications[idx], ...data};
  } else {
    applications.push({id: nextId++, ...data});
  }
  closeModal();
  render();
});

render();
</script>

</body>
</html>
